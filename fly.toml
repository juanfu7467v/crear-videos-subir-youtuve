app = 'crear-videos-subir-youtuve'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  auto_stop_timeout = 7200
  min_machines_running = 0
  processes = ['app']

# ESTA ES LA CORRECCIÓN CRUCIAL
[processes]
  app = "python main.py"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
