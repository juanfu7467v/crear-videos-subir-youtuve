app = 'crear-videos-subir-youtuve'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Permitimos el auto-stop para ahorrar costos
  auto_stop_machines = true
  auto_start_machines = true
  # El tiempo se define en segundos: 40 minutos = 2400 segundos
  auto_stop_timeout = 2400
  # Cambiamos a 0 para que la máquina pueda apagarse si no hay actividad
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
