app = 'crear-videos-subir-youtuve'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Activamos el auto-stop para ahorrar cuando no haya tráfico
  auto_stop_machines = true
  auto_start_machines = true
  auto_stop_timeout = 2400
  min_machines_running = 0
  processes = ['app']

# AQUÍ ESTÁ LA CORRECCIÓN: Definimos cómo iniciar la app
[processes]
  app = "gunicorn main:app --bind 0.0.0.0:8080 --workers 1 --worker-class gthread --threads 4 --timeout 300"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
