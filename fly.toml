app = 'crear-videos-subir-youtuve'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Mantiene la máquina encendida por 2 horas tras inactividad
  auto_stop_timeout = 7200 
  min_machines_running = 0
  processes = ['app']

[processes]
  app = "python main.py"

[[vm]]
  # Configuración basada en tu panel de Fly.io (shared-cpu-6x y 8GB)
  cpu_kind = 'shared'
  cpus = 6
  memory_mb = 8192
