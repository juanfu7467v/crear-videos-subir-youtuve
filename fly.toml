app = 'crear-videos-subir-youtuve'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # Mantiene la máquina encendida por 2 horas tras inactividad
  auto_stop_timeout = 7200 
  min_machines_running = 0
  processes = ['app']

[processes]
  app = "python main.py"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  # Memoria actualizada a 6 GB (1024 * 6)
  memory_mb = 6144 
